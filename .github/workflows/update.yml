name: Daily Dividend Update

on:
  schedule:
    # 매일 한국 시간 매시간 정각에 자동 실행
    - cron: '0 * * * *'
  workflow_dispatch: # 버튼으로 수동 실행하는 기능

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 파일 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필수 부품(패키지) 설치
        run: pip install -r requirements.txt

      - name: DART 배당 데이터 수집 로봇 실행
        run: python update.py

      - name: 결과물(data.json)을 저장소에 반영
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"
          git add data.json
          git commit -m "배당 데이터 자동 업데이트" || exit 0
          git push
